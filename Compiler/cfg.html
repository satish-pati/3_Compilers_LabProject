<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Flow - Compiler Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
<div class="page-header">
<div class="header2">
<a href="index.html" class="back-btn">⬅ Back</a>
<h1> Control Flow Graphs</h1>
</div>
</div>
<div class="toolbar">
</div>
<div class="image-container">
<div class="zoom-controls">
<button class="zoom-btn" onclick="zoomImage('cfg', -0.1)">−</button>
<span class="zoom-level" id="cfgZoomLevel">100%</span>
<button class="zoom-btn" onclick="zoomImage('cfg', 0.1)">+</button>
<button class="zoom-btn " onclick="resetZoom('cfg')">⟲</button>
<button class="zoom-btn fullscreen-btn" onclick="openFullscreen('cfg')">⛶</button>
</div>
<div class="image-wrapper" id="cfgWrapper" onmousedown="startPan(event, 'cfg')">
<img id="cfgImage" src="tac_flow.png" alt="Control Flow Graph">
</div>
</div>
<div id="fullscreenModal" class="fullscreen-modal"></div>
<script src="script.js"></script>
</body>
</html>
